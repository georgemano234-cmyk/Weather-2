<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>طقس مصر - توقعات دقيقة</title>
    
    <link rel="manifest" href="https://progressier.app/qtPhP1TrJ4pyRHjWohIc/progressier.json"/>
    <script defer src="https://progressier.app/qtPhP1TrJ4pyRHjWohIc/script.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', 'Tahoma', sans-serif;
            min-height: 100vh;
            padding: 15px;
            position: relative;
            overflow-x: hidden;
        }
        
        .weather-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            transition: all 0.5s ease;
        }
        
        .bg-clear {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        }
        
        .bg-clouds {
            background: linear-gradient(135deg, #4a5568 0%, #718096 100%);
        }
        
        .bg-rain {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        .weather-card {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(12px);
            border-radius: 35px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .location-section {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .city-name {
            font-size: 24px;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .district-name {
            font-size: 14px;
            color: #ffaa88;
            margin-top: 5px;
        }
        
        .date {
            color: rgba(255,255,255,0.7);
            margin-top: 5px;
            font-size: 13px;
        }
        
        .temp-main {
            text-align: center;
            margin: 15px 0;
            color: white;
        }
        
        .temp-value {
            font-size: 64px;
            font-weight: bold;
        }
        
        .weather-desc {
            font-size: 18px;
            margin-top: 5px;
            color: #ffeaa7;
        }
        
        .details {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            text-align: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }
        
        .detail-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 8px;
        }
        
        .detail-label {
            font-size: 11px;
            opacity: 0.7;
        }
        
        .detail-value {
            font-size: 16px;
            font-weight: bold;
        }
        
        .hourly-section {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(12px);
            border-radius: 25px;
            padding: 15px;
            margin-bottom: 15px;
            overflow-x: auto;
        }
        
        .hourly-title {
            color: white;
            font-size: 14px;
            margin-bottom: 12px;
            padding-right: 8px;
            border-right: 3px solid #ffaa44;
        }
        
        .hourly-list {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        
        .hourly-item {
            min-width: 70px;
            text-align: center;
            color: white;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 10px 5px;
        }
        
        .hourly-time {
            font-size: 12px;
            font-weight: bold;
        }
        
        .hourly-temp {
            font-size: 18px;
            font-weight: bold;
            margin: 5px 0;
        }
        
        .hourly-icon {
            font-size: 24px;
        }
        
        .forecast-section {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(12px);
            border-radius: 25px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .forecast-list {
            display: flex;
            overflow-x: auto;
            gap: 12px;
        }
        
        .forecast-day {
            min-width: 80px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 10px;
            text-align: center;
            color: white;
        }
        
        .extra-info {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(12px);
            border-radius: 25px;
            padding: 15px;
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .info-card {
            background: rgba(255,255,255,0.1);
            border-radius: 18px;
            padding: 10px;
            text-align: center;
            color: white;
        }
        
        .info-label {
            font-size: 11px;
            opacity: 0.7;
        }
        
        .info-value {
            font-size: 14px;
            font-weight: bold;
            margin-top: 5px;
        }
        
        .medical-tips {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(12px);
            border-radius: 25px;
            padding: 15px;
            margin-bottom: 15px;
            color: white;
        }
        
        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .search-box input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 14px;
        }
        
        .search-box button {
            padding: 12px 18px;
            border: none;
            border-radius: 30px;
            background: #ffaa44;
            color: #1e3c4a;
            font-weight: bold;
            cursor: pointer;
        }
        
        .flood-alert {
            background: rgba(200, 50, 50, 0.85);
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 15px;
            text-align: center;
            color: white;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 1; background: rgba(220, 70, 70, 0.95); }
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }
        
        .tips-content ul {
            padding-right: 20px;
        }
        
        .tips-content li {
            margin: 5px 0;
            line-height: 1.4;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div id="weatherBg" class="weather-bg bg-clear"></div>
    
    <div class="container">
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="🔍 اكتب اسم مدينة أو حي...">
            <button onclick="searchCity()">بحث</button>
            <button onclick="getMyLocation()">📍 موقعي</button>
        </div>
        
        <div id="weatherContent">
            <div class="loading">
                <div style="font-size: 30px;">🌍</div>
                <div>جاري تحديد موقعك...</div>
            </div>
        </div>
    </div>

    <script>
        let currentLat = 0, currentLon = 0;
        
        function getArabicDay(date) {
            const days = ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
            return days[date.getDay()];
        }
        
        function getArabicMonth(date) {
            const months = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
            return months[date.getMonth()];
        }
        
        function getWeatherDescription(code, isDay = true, rainProb = 0) {
            const map = {
                0: { day: "☀️ مشمش", night: "🌙 صافي" },
                1: { day: "🌤️ قليل السحب", night: "🌤️ قليل السحب" },
                2: { day: "⛅ غائم جزئياً", night: "⛅ غائم جزئياً" },
                3: { day: "☁️ غائم", night: "☁️ غائم" },
                45: { day: "🌫️ ضباب", night: "🌫️ ضباب" },
                48: { day: "🌫️ ضباب كثيف", night: "🌫️ ضباب كثيف" },
                51: { day: "🌧️ رذاذ خفيف", night: "🌧️ رذاذ خفيف" },
                53: { day: "🌧️ رذاذ", night: "🌧️ رذاذ" },
                55: { day: "🌧️ رذاذ كثيف", night: "🌧️ رذاذ كثيف" },
                61: { day: "🌧️ مطر خفيف", night: "🌧️ مطر خفيف" },
                63: { day: "🌧️ مطر", night: "🌧️ مطر" },
                65: { day: "🌧️ مطر غزير", night: "🌧️ مطر غزير" },
                80: { day: "🌦️ زخات مطر", night: "🌦️ زخات مطر" },
                81: { day: "🌧️ زخات مطر", night: "🌧️ زخات مطر" },
                82: { day: "⛈️ زخات غزيرة", night: "⛈️ زخات غزيرة" },
                95: { day: "⛈️ عاصفة رعدية", night: "⛈️ عاصفة رعدية" }
            };
            const condition = map[code];
            if (condition) return isDay ? condition.day : condition.night;
            return "🌡️ متغير";
        }
        
        function getBackgroundType(code, rainProb) {
            if (code >= 95) return "storm";
            if (code >= 80 || rainProb > 60) return "rain";
            if (code >= 61 || rainProb > 40) return "rain";
            if (code === 45 || code === 48) return "fog";
            if (code === 3 || code === 2) return "clouds";
            return "clear";
        }
        
        function setBackground(type) {
            const bg = document.getElementById('weatherBg');
            bg.className = 'weather-bg';
            if (type === 'clear') bg.classList.add('bg-clear');
            else if (type === 'clouds') bg.classList.add('bg-clouds');
            else if (type === 'rain') bg.classList.add('bg-rain');
            else bg.classList.add('bg-clear');
        }
        
        async function getLocationName(lat, lon) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ar`);
                const data = await response.json();
                if (data.address) {
                    const city = data.address.city || data.address.town || data.address.village || "";
                    const district = data.address.suburb || data.address.neighbourhood || "";
                    return { city, district };
                }
            } catch(e) {}
            return { city: "", district: "" };
        }
        
        async function fetchWeather(lat, lon) {
            currentLat = lat; currentLon = lon;
            const content = document.getElementById('weatherContent');
            content.innerHTML = `<div class="loading"><div>🌍 جلب بيانات الطقس...</div></div>`;
            
            try {
                const location = await getLocationName(lat, lon);
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&hourly=temperature_2m,weather_code,precipitation_probability&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,uv_index_max&timezone=auto&forecast_days=7`;
                
                const resp = await fetch(url);
                const data = await resp.json();
                
                const temp = Math.round(data.current.temperature_2m);
                const weatherCode = data.current.weather_code;
                const rainProb = data.daily.precipitation_probability_max[0] || 0;
                setBackground(getBackgroundType(weatherCode, rainProb));
                
                let hourlyHtml = '';
                for (let i = 0; i < 12; i++) {
                    const hourTemp = Math.round(data.hourly.temperature_2m[i]);
                    const hourCode = data.hourly.weather_code[i];
                    const hourTime = i < 12 ? `${i} ص` : `${i - 12} م`;
                    hourlyHtml += `<div class="hourly-item"><div class="hourly-time">${hourTime}</div><div class="hourly-icon">${getWeatherDescription(hourCode).split(' ')[0]}</div><div class="hourly-temp">${hourTemp}°</div></div>`;
                }

                let forecastHtml = '';
                for (let i = 0; i < 7; i++) {
                    const date = new Date(data.daily.time[i]);
                    forecastHtml += `<div class="forecast-day"><div>${getArabicDay(date)}</div><div style="font-size:24px;">${getWeatherDescription(data.daily.weather_code[i]).split(' ')[0]}</div><div>${Math.round(data.daily.temperature_2m_max[i])}°</div></div>`;
                }
                
                content.innerHTML = `
                    <div class="weather-card">
                        <div class="location-section">
                            <div class="city-name">📍 ${location.city || "موقعي"} 🇪🇬</div>
                            ${location.district ? `<div class="district-name">📍 ${location.district}</div>` : ''}
                            <div class="date">${getArabicDay(new Date())} ${new Date().getDate()} ${getArabicMonth(new Date())}</div>
                        </div>
                        <div class="temp-main">
                            <div class="temp-value">${temp}°C</div>
                            <div class="weather-desc">${getWeatherDescription(weatherCode)}</div>
                        </div>
                        <div class="details">
                            <div class="detail-item"><div class="detail-label">💧 رطوبة</div><div class="detail-value">${data.current.relative_humidity_2m}%</div></div>
                            <div class="detail-item"><div class="detail-label">💨 رياح</div><div class="detail-value">${Math.round(data.current.wind_speed_10m)}</div></div>
                            <div class="detail-item"><div class="detail-label">🌡️ عظمى</div><div class="detail-value">${Math.round(data.daily.temperature_2m_max[0])}°</div></div>
                            <div class="detail-item"><div class="detail-label">🌙 صغرى</div><div class="detail-value">${Math.round(data.daily.temperature_2m_min[0])}°</div></div>
                        </div>
                    </div>
                    <div class="hourly-section"><div class="hourly-title">⏰ الساعات القادمة</div><div class="hourly-list">${hourlyHtml}</div></div>
                    <div class="forecast-section"><div class="hourly-title">📅 7 أيام</div><div class="forecast-list">${forecastHtml}</div></div>
                `;
                
            } catch (err) {
                content.innerHTML = `<div class="loading">❌ خطأ في جلب البيانات</div>`;
            }
        }
        
        function searchCity() {
            const input = document.getElementById('cityInput').value.trim();
            fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(input)},+Egypt&format=json&limit=1`)
                .then(r => r.json()).then(data => data.length ? fetchWeather(data[0].lat, data[0].lon) : alert("غير موجودة"));
        }
        
        function getMyLocation() {
            navigator.geolocation.getCurrentPosition((pos) => fetchWeather(pos.coords.latitude, pos.coords.longitude));
        }
        
        window.onload = getMyLocation;
    </script>
</body>
</html>
