<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>طقس مصر Pro</title>
    
    <link rel="manifest" href="https://progressier.app/qtPhP1TrJ4pyRHjWohIc/progressier.json"/>
    <script defer src="https://progressier.app/qtPhP1TrJ4pyRHjWohIc/script.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { min-height: 100vh; padding: 15px; position: relative; overflow-x: hidden; background: #1a202c; }
        .weather-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; transition: all 0.8s ease; background-size: 400% 400% !important; animation: gradientBG 15s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .bg-clear { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); }
        .bg-clouds { background: linear-gradient(135deg, #4a5568 0%, #718096 100%); }
        .bg-rain { background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%); }
        .container { max-width: 500px; margin: 0 auto; position: relative; z-index: 1; }
        .search-box { display: flex; gap: 8px; margin-bottom: 20px; }
        .search-box input { flex: 1; padding: 14px 20px; border: none; border-radius: 30px; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); color: #fff; border: 1px solid rgba(255,255,255,0.2); outline: none; }
        .search-box button { padding: 0 20px; border: none; border-radius: 30px; background: #ffaa44; color: #1a202c; font-weight: bold; cursor: pointer; }
        .weather-card { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px); border-radius: 40px; padding: 30px 20px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.15); text-align: center; color: white; }
        .temp-value { font-size: 80px; font-weight: 700; line-height: 1; }
        .details-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 25px; }
        .detail-card { background: rgba(255, 255, 255, 0.08); padding: 15px; border-radius: 25px; display: flex; flex-direction: column; align-items: center; }
        .section-title { color: white; font-size: 16px; margin: 20px 10px 10px 0; }
        .horizontal-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .scroll-item { min-width: 85px; background: rgba(0, 0, 0, 0.3); border-radius: 25px; padding: 15px 10px; text-align: center; color: white; }
        .loading-screen { text-align: center; color: white; padding: 50px; }
    </style>
</head>
<body>
    <div id="weatherBg" class="weather-bg bg-clear"></div>
    <div class="container">
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="بحث عن مدينة...">
            <button onclick="searchCity()">بحث</button>
            <button onclick="getMyLocation()" style="background: rgba(255,255,255,0.2); color: white;">📍</button>
        </div>
        <div id="weatherContent">
            <div class="loading-screen">
                <h2>🌍 جاري جلب البيانات...</h2>
                <p>يرجى تفعيل أذونات الموقع والإشعارات</p>
            </div>
        </div>
    </div>

    <script>
        const daysAr = ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
        const monthsAr = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];

        // 1. طلب إذن الإشعارات عند التشغيل
        function initNotifications() {
            if ("Notification" in window) {
                Notification.requestPermission();
            }
        }

        // 2. إرسال إشعار بالحرارة
        function sendWeatherNotification(temp, city) {
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification("تحديث الطقس", {
                    body: `درجة الحرارة الآن في ${city} هي ${temp}°C`,
                    icon: "https://cdn-icons-png.flaticon.com/512/252/252035.png"
                });
            }
        }

        async function fetchWeather(lat, lon) {
            const content = document.getElementById('weatherContent');
            try {
                const locResp = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ar`);
                const locData = await locResp.json();
                const cityName = locData.address.city || locData.address.town || "موقعي الحالى";

                const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&hourly=temperature_2m,weather_code&daily=sunrise,sunset&timezone=auto`;
                const response = await fetch(weatherUrl);
                const data = await response.json();

                const temp = Math.round(data.current.temperature_2m);
                renderWeather(data, cityName);
                
                // إرسال الإشعار فور جلب البيانات
                sendWeatherNotification(temp, cityName);
            } catch (error) {
                content.innerHTML = `<div class="weather-card">❌ فشل جلب البيانات</div>`;
            }
        }

        function renderWeather(data, cityName) {
            const current = data.current;
            const now = new Date();
            const bg = document.getElementById('weatherBg');
            bg.className = 'weather-bg ' + (current.weather_code > 50 ? 'bg-rain' : current.weather_code > 0 ? 'bg-clouds' : 'bg-clear');

            document.getElementById('weatherContent').innerHTML = `
                <div class="weather-card">
                    <h2>📍 ${cityName}</h2>
                    <div class="temp-value">${Math.round(current.temperature_2m)}°</div>
                    <p style="margin-bottom:20px;">${daysAr[now.getDay()]}، ${now.getDate()} ${monthsAr[now.getMonth()]}</p>
                    <div class="details-grid">
                        <div class="detail-card"><span>💧 الرطوبة</span><strong>${current.relative_humidity_2m}%</strong></div>
                        <div class="detail-card"><span>💨 الرياح</span><strong>${current.wind_speed_10m} كم/س</strong></div>
                        <div class="detail-card"><span>🌅 الشروق</span><strong>${data.daily.sunrise[0].split('T')[1]}</strong></div>
                        <div class="detail-card"><span>🌇 الغروب</span><strong>${data.daily.sunset[0].split('T')[1]}</strong></div>
                    </div>
                </div>
                <h3 class="section-title">⏰ الساعات القادمة</h3>
                <div class="horizontal-scroll" id="hourlyList"></div>
            `;
            
            let hourlyHTML = '';
            for(let i=0; i<12; i++) {
                hourlyHTML += `
                    <div class="scroll-item">
                        <div>${new Date(data.hourly.time[i]).getHours()}:00</div>
                        <div style="font-weight:bold;">${Math.round(data.hourly.temperature_2m[i])}°</div>
                    </div>`;
            }
            document.getElementById('hourlyList').innerHTML = hourlyHTML;
        }

        function getMyLocation() {
            navigator.geolocation.getCurrentPosition(
                (p) => fetchWeather(p.coords.latitude, p.coords.longitude),
                () => { alert("يرجى السماح بالوصول للموقع"); fetchWeather(30.04, 31.23); },
                { enableHighAccuracy: true }
            );
        }

        function searchCity() {
            const city = document.getElementById('cityInput').value;
            fetch(`https://nominatim.openstreetmap.org/search?q=${city}&format=json&limit=1`)
                .then(r => r.json()).then(d => d.length ? fetchWeather(d[0].lat, d[0].lon) : alert("غير موجودة"));
        }

        window.onload = () => {
            initNotifications();
            getMyLocation();
        };
    </script>
</body>
</html>
